name: Reusable Deploy Pages

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version used for install and build steps.
        required: false
        default: '20'
        type: string
      working-directory:
        description: Directory containing the app to build.
        required: false
        default: '.'
        type: string
      install-command:
        description: Command used to install dependencies.
        required: false
        default: npm ci
        type: string
      lint-command:
        description: Optional lint command. Leave empty to skip.
        required: false
        default: ''
        type: string
      test-command:
        description: Optional test command. Leave empty to skip.
        required: false
        default: ''
        type: string
      build-command:
        description: Command used to create the production build.
        required: false
        default: npm run build
        type: string
      artifact-path:
        description: Build output directory uploaded to Pages.
        required: false
        default: dist
        type: string
    outputs:
      page-url:
        description: Deployed GitHub Pages URL.
        value: ${{ jobs.deploy.outputs.page_url }}

permissions:
  contents: read
  id-token: write
  pages: write

concurrency:
  group: pages-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.install-command }}

      - name: Lint
        if: ${{ inputs.lint-command != '' }}
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.lint-command }}

      - name: Test
        if: ${{ inputs.test-command != '' }}
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.test-command }}

      - name: Build
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.build-command }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ inputs.working-directory }}/${{ inputs.artifact-path }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
