name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          cache: npm

      - name: Set up npm
        run: npm install --global npm@11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Verify repository
        run: npm run verify

      - name: Determine release mode
        id: release_mode
        run: |
          PACKAGE_NAME="$(node -p "require('./packages/ui/package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./packages/ui/package.json').version")"

          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

          if find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | grep -q .; then
            echo "should_version=true" >> "$GITHUB_OUTPUT"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_version=false" >> "$GITHUB_OUTPUT"

          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_publish=true" >> "$GITHUB_OUTPUT"

      - name: Version packages and push
        if: steps.release_mode.outputs.should_version == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          npm run version-packages

          git add .changeset package-lock.json packages/ui/CHANGELOG.md packages/ui/package.json

          if git diff --cached --quiet; then
            echo "No version changes were produced."
            exit 0
          fi

          git commit -m "chore: version packages"
          git push origin HEAD:main

      - name: Publish package
        if: steps.release_mode.outputs.should_publish == 'true'
        run: npm run release
